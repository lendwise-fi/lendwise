<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 32 32"
  width="32"
  height="32"
>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect
    x="1"
    y="1"
    width="30"
    height="30"
    rx="8"
    fill="#333333"
    fillOpacity="0.1"
    stroke="#333333"
    strokeOpacity="0.2"
    strokeWidth="1"
    filter="url(#glow)"
  />

  <polygon
    points="17 4 5 18 15 18 14 27 26 13 16 13 17 4"
    fill="none"
    stroke="#06b6d4"
    strokeWidth="2"
    strokeLinecap="round"
    strokeLinejoin="round"
    transform="translate(0, 0)"
  />
</svg>